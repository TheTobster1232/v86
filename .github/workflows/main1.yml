name: Build v86 (minimal)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3

    - name: Build v86
      run: |
        make build

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: v86-build
        path: build/
